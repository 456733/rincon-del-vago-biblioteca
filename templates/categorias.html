<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Categorías</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    {% include "nav.html" %}
    
    <div class="container">
        <div class="card">
            <h2>Registrar Nueva Categoría</h2>
            <form method="POST">
                <div class="form-group">
                    <label>Nombre de la Categoría:</label>
                    <input type="text" name="nombre" placeholder="Ej: Novela Policiaca" required>
                </div>
                <button type="submit">Guardar Categoría</button>
            </form>
        </div>
        
        <div class="card">
            <h2>Lista de Categorías Existentes</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Nombre de la Categoría</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for cat in categorias %}
                        <tr>
                            <td><strong>{{ cat.nombre }}</strong></td>
                            <td>
                                <form action="{{ url_for('eliminar_categoria', id_cat=cat.id) }}" method="POST" class="inline-form">
                                    <button type="submit" class="btn-red" style="padding: 5px 10px; font-size: 0.8rem;">Eliminar</button>
                                </form>
                            </td>
                        </tr>
                        {% else %}
                        <tr>
                            <td colspan="2" style="text-align: center;">No hay categorías registradas aún.</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
