<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Usuarios</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    {% include "nav.html" %}
    
    <div class="container">
        <div class="card">
            <h2>Registrar Nuevo Usuario</h2>
            <form method="POST">
                <div class="form-group">
                    <label>Nombre Completo:</label>
                    <input type="text" name="nombre" placeholder="Ej: Juan Pérez" required>
                </div>
                
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" name="email" placeholder="juan@ejemplo.com">
                </div>
                
                <div class="form-group">
                    <label>Teléfono:</label>
                    <input type="text" name="telefono" placeholder="Ej: 555-1234">
                </div>
                
                <button type="submit">Guardar Usuario</button>
            </form>
        </div>
        
        <div class="card">
            <h2>Lista de Usuarios</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Email</th>
                            <th>Teléfono</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for u in usuarios %}
                        <tr>
                            <td>{{ u.id }}</td>
                            <td><strong>{{ u.nombre }}</strong></td>
                            <td>{{ u.email }}</td>
                            <td>{{ u.telefono }}</td>
                            <td>
                                <a href="{{ url_for('editar_usuario', id_usuario=u.id) }}" style="color: var(--primary); text-decoration: none; font-weight: 600;">Editar</a>
                                <form action="{{ url_for('eliminar_usuario', id_usuario=u.id) }}" method="POST" class="inline-form" style="display:inline; margin-left: 10px;">
                                    <button type="submit" class="btn-red" style="padding: 5px 10px; font-size: 0.8rem;">Eliminar</button>
                                </form>
                            </td>
                        </tr>
                        {% else %}
                        <tr>
                            <td colspan="5" style="text-align: center;">No hay usuarios registrados aún.</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
